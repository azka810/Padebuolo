# Paste ke Streamlit Cloud -> Manage app -> Settings -> Secrets
APP_PASSWORD = "ganti_password_app"

# Opsional tapi sangat disarankan biar data tetap ada setelah reboot/redeploy.
# Buat repo GitHub private terpisah khusus data, lalu buat token dengan Contents: Read and Write.
PERSISTENCE_PROVIDER = "github"
GITHUB_TOKEN = "github_pat_xxx"
GITHUB_REPO = "username/padebuolo-data"
GITHUB_BRANCH = "main"
GITHUB_DATA_FILE = "padebuolo_live_backup.json"
